server_tokens off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /app/public;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_disable "msie6";

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Favicon & robots
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Cache static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|eot|ttf|woff|woff2)$ {
        expires 12m;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to application files
    location ~ /(\.env|\.git|\.gitignore|composer\.|README\.) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Laravel public folder
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP FPM handling
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Deny direct access to uploads folder
    location /uploads {
        try_files $uri =404;
    }

    error_page 404 /index.php;

    # Error logging
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined buffer=32k flush=1m;
}
